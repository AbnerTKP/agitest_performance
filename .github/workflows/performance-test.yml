name: Teste de Performance - BlazeDemo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  teste-carga:
    name: Teste de Carga (Load Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Baixar e instalar JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Executar Teste de Carga
        run: |
          jmeter -n -t blazedemo-teste-carga.jmx -l resultado-carga.jtl -e -o relatorio-carga

      - name: Exibir resultados
        if: always()
        run: |
          echo "=== Resultados do Teste de Carga ==="
          cat resultado-carga.jtl | head -1
          echo ""
          echo "Total de requisicoes: $(tail -n +2 resultado-carga.jtl | wc -l)"
          echo "Requisicoes com erro: $(tail -n +2 resultado-carga.jtl | awk -F',' '$8=="false"' | wc -l)"

      - name: Upload do relatorio HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-carga
          path: relatorio-carga/

      - name: Upload dos resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado-carga
          path: resultado-carga.jtl

  teste-pico:
    name: Teste de Pico (Spike Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Baixar e instalar JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Executar Teste de Pico
        run: |
          jmeter -n -t blazedemo-teste-pico.jmx -l resultado-pico.jtl -e -o relatorio-pico

      - name: Exibir resultados
        if: always()
        run: |
          echo "=== Resultados do Teste de Pico ==="
          cat resultado-pico.jtl | head -1
          echo ""
          echo "Total de requisicoes: $(tail -n +2 resultado-pico.jtl | wc -l)"
          echo "Requisicoes com erro: $(tail -n +2 resultado-pico.jtl | awk -F',' '$8=="false"' | wc -l)"

      - name: Upload do relatorio HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-pico
          path: relatorio-pico/

      - name: Upload dos resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado-pico
          path: resultado-pico.jtl
